<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ruta Europa 2026 - Mapa Móvil</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1f2937;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    header {
      background: linear-gradient(135deg, #2563eb, #0f172a);
      color: white;
      padding: 18px 16px 14px;
      z-index: 1000;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    }

    header h1 {
      font-size: 22px;
      margin-bottom: 4px;
    }

    header p {
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.4;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 100%;
      z-index: 1;
    }

    .desktop-layout {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    .map-wrap {
      width: 100%;
      height: 100%;
      min-height: 100%;
    }

    .bottom-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: white;
      border-radius: 26px 26px 0 0;
      box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.22);
      z-index: 1000;
      max-height: 46vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drag-handle {
      width: 48px;
      height: 5px;
      background: #cbd5e1;
      border-radius: 999px;
      margin: 10px auto 8px;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 0 16px 10px;
      border-bottom: 1px solid #e5e7eb;
    }

    .panel-header h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .panel-header p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.4;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .btn.secondary {
      background: #0f172a;
    }

    .stops-list {
      overflow-y: auto;
      padding: 12px 14px 18px;
      -webkit-overflow-scrolling: touch;
    }

    .stop {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      background: #ffffff;
      min-height: 86px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
    }

    .stop:active {
      transform: scale(0.98);
      background: #eff6ff;
    }

    .stop-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stop-number {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #2563eb;
      color: white;
      font-weight: bold;
      font-size: 14px;
      flex-shrink: 0;
    }

    .stop-title {
      font-weight: bold;
      font-size: 17px;
    }

    .stop-date {
      margin-top: 8px;
      font-size: 13px;
      color: #475569;
      padding-left: 44px;
    }

    .stop-type {
      display: inline-block;
      margin-top: 8px;
      margin-left: 44px;
      background: #dcfce7;
      color: #166534;
      font-size: 12px;
      padding: 5px 9px;
      border-radius: 999px;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
    }

    .popup-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .popup-text {
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .desktop-layout {
        display: block;
        height: calc(100vh - 86px);
        position: relative;
      }

      .map-wrap {
        width: 100%;
        height: 100%;
        min-height: 520px;
      }

      #map {
        width: 100%;
        height: 100%;
        min-height: 520px;
      }
    }

    @media (min-width: 901px) {
      body {
        overflow: auto;
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .desktop-layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        height: calc(100vh - 88px);
      }

      #map {
        height: 100%;
      }

      .bottom-panel {
        position: relative;
        max-height: none;
        height: 100%;
        border-radius: 0;
        box-shadow: none;
        grid-row: 1;
        grid-column: 1;
        order: 1;
      }

      .drag-handle {
        display: none;
      }

      .map-wrap {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Ruta Europa 2026 ✈️</h1>
      <p>Bogotá · Madrid · Camino de Santiago · Oporto · París · Bélgica · Praga · Italia</p>
    </header>

    <div class="desktop-layout">
      <section class="map-wrap" id="map"></section>

      <aside class="bottom-panel">
        <div class="drag-handle"></div>

        <div class="panel-header">
          <h2>Itinerario del viaje</h2>
          <p>Toca una ciudad para verla en el mapa. Usa los botones para moverte por la ruta.</p>
        </div>

        <div class="controls">
          <button class="btn secondary" id="prevBtn">← Anterior</button>
          <button class="btn" id="nextBtn">Siguiente →</button>
        </div>

        <div class="stops-list" id="stopsList"></div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const stops = [
      { city: 'Bogotá', country: 'Colombia', date: 'Día 1', type: 'Vuelo internacional', lat: 4.711, lng: -74.0721 },
      { city: 'Madrid', country: 'España', date: 'Día 2 - Día 3', type: 'Hospedaje', lat: 40.4168, lng: -3.7038 },
      { city: 'Sarria', country: 'España', date: 'Día 4', type: 'Hospedaje / inicio Camino', lat: 42.7772, lng: -7.4144 },
      { city: 'Portomarín', country: 'España', date: 'Día 5', type: 'Hospedaje Camino', lat: 42.8079, lng: -7.6155 },
      { city: 'Palas de Rei', country: 'España', date: 'Día 6', type: 'Hospedaje Camino', lat: 42.8742, lng: -7.8689 },
      { city: 'Arzúa', country: 'España', date: 'Día 7', type: 'Hospedaje Camino', lat: 42.9272, lng: -8.1642 },
      { city: 'O Pedrouzo', country: 'España', date: 'Día 8', type: 'Hospedaje Camino', lat: 42.9055, lng: -8.3639 },
      { city: 'Santiago de Compostela', country: 'España', date: 'Día 9 - Día 10', type: 'Llegada / hospedaje', lat: 42.8782, lng: -8.5448 },
      { city: 'Oporto', country: 'Portugal', date: 'Día 11 - Día 12', type: 'Hospedaje', lat: 41.1579, lng: -8.6291 },
      { city: 'París', country: 'Francia', date: 'Día 13 - Día 15', type: 'Hospedaje', lat: 48.8566, lng: 2.3522 },
      { city: 'Brujas', country: 'Bélgica', date: 'Día 16 - Día 17', type: 'Hospedaje', lat: 51.2093, lng: 3.2247 },
      { city: 'Bruselas', country: 'Bélgica', date: 'Día 18', type: 'Traslado', lat: 50.8503, lng: 4.3517 },
      { city: 'Praga', country: 'República Checa', date: 'Día 19 - Día 20', type: 'Hospedaje', lat: 50.0755, lng: 14.4378 },
      { city: 'Roma', country: 'Italia', date: 'Día 21 - Día 22', type: 'Hospedaje', lat: 41.9028, lng: 12.4964 },
      { city: 'Florencia', country: 'Italia', date: 'Día 23 - Día 24', type: 'Hospedaje', lat: 43.7696, lng: 11.2558 },
      { city: 'Pisa', country: 'Italia', date: 'Día 25', type: 'Visita / traslado', lat: 43.7228, lng: 10.4017 },
      { city: 'Madrid', country: 'España', date: 'Día 26 - Día 27', type: 'Hospedaje final', lat: 40.4168, lng: -3.7038 },
      { city: 'Bogotá', country: 'Colombia', date: 'Día 28', type: 'Regreso', lat: 4.711, lng: -74.0721 }
    ];

    let currentIndex = 0;

    const map = L.map('map', {
      zoomControl: true,
      tap: true
    }).setView([43.5, 2], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const routeCoordinates = stops.map(stop => [stop.lat, stop.lng]);

    const routeLine = L.polyline(routeCoordinates, {
      color: '#2563eb',
      weight: 4,
      opacity: 0.85,
      dashArray: '8, 8'
    }).addTo(map);

    const markers = [];

    stops.forEach((stop, index) => {
      const marker = L.marker([stop.lat, stop.lng]).addTo(map);

      marker.bindPopup(`
        <div class="popup-title">${index + 1}. ${stop.city}</div>
        <div class="popup-text">
          <strong>País:</strong> ${stop.country}<br>
          <strong>Fecha:</strong> ${stop.date}<br>
          <strong>Tipo:</strong> ${stop.type}
        </div>
      `);

      markers.push(marker);
    });

    function focusStop(index) {
      currentIndex = index;
      const stop = stops[index];
      map.setView([stop.lat, stop.lng], index === 0 || index === stops.length - 1 ? 5 : 9);
      markers[index].openPopup();

      document.querySelectorAll('.stop').forEach((item, i) => {
        item.style.borderColor = i === index ? '#2563eb' : '#e5e7eb';
        item.style.background = i === index ? '#eff6ff' : '#ffffff';
      });
    }

    map.fitBounds(routeLine.getBounds(), { padding: [40, 40] });

    const stopsList = document.getElementById('stopsList');

    stops.forEach((stop, index) => {
      const item = document.createElement('div');
      item.className = 'stop';
      item.innerHTML = `
        <div class="stop-top">
          <span class="stop-number">${index + 1}</span>
          <span class="stop-title">${stop.city}</span>
        </div>
        <div class="stop-date">${stop.date} · ${stop.country}</div>
        <span class="stop-type">${stop.type}</span>
      `;

      item.addEventListener('click', () => focusStop(index));
      stopsList.appendChild(item);
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      const next = currentIndex < stops.length - 1 ? currentIndex + 1 : 0;
      focusStop(next);
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      const prev = currentIndex > 0 ? currentIndex - 1 : stops.length - 1;
      focusStop(prev);
    });

    setTimeout(() => {
      map.invalidateSize();
    }, 500);
  </script>
</body>
</html>
